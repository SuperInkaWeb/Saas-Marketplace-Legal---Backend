services:
  db:
    image: postgres:16-alpine
    container_name: saas-legit-db
    environment:
      POSTGRES_DB: saas_legit_prod_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: saas-legit-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET_PROD=${JWT_SECRET_PROD}
      - RESEND_API_KEY_PROD=${RESEND_API_KEY_PROD}
      - RESEND_SENDER_EMAIL_PROD=${RESEND_SENDER_EMAIL_PROD}
      - CLOUDINARY_CLOUD_NAME_PROD=${CLOUDINARY_CLOUD_NAME_PROD}
      - CLOUDINARY_API_KEY_PROD=${CLOUDINARY_API_KEY_PROD}
      - CLOUDINARY_API_SECRET_PROD=${CLOUDINARY_API_SECRET_PROD}
    depends_on:
      - db

volumes:
  postgres_data:
