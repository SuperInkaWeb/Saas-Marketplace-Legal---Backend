spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

app:
  security:
    jwt:
      secret: ${JWT_SECRET_PROD}
      expiration-ms: 3600000

resend:
  api:
    key: ${RESEND_API_KEY_PROD}
  sender-email: ${RESEND_SENDER_EMAIL_PROD}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME_PROD}
  api-key: ${CLOUDINARY_API_KEY_PROD}
  api-secret: ${CLOUDINARY_API_SECRET_PROD}

AI:
  GROQ_API_KEY: ${GROQ_API_KEY}

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR